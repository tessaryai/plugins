# crew.config.yaml — optional configuration for the `crew` plugin.
#
# Place this file at your repository root. Everything here is optional: crew
# falls back to your AGENTS.md / CLAUDE.md and then to built-in defaults. Run
# `/crew:init-config` to generate a version pre-filled for your repo.

# How crew sources work and persists results.
#   auto   — github when you pass an issue/PR number (or run with no task in an
#            authed repo); local for any freeform task. (default)
#   github — always GitHub issues/PRs (requires `gh auth status` to be green).
#   local  — always local: freeform tasks tracked in the ledger below; no gh,
#            no remote required.
mode: auto

project:
  # Human-readable project name (used in PR/issue text). Optional.
  name: "My App"
  # Entry point crew reads first when exploring. If unset, crew auto-detects
  # docs/INDEX.md, docs/README.md, or falls back to globbing docs/.
  docs_index: "docs/README.md"

# Names of the GitHub labels crew keys off. Change these to match your repo.
labels:
  bug: bug                  # triggers triage-bug; with `triaged` triggers implement
  task: task                # triggers triage-task; with `triaged` triggers implement
  triaged: triaged          # added by triage; gates implementation
  docs: docs                # triggers update-docs
  agent_pr: agent-generated # applied to PRs crew opens
  needs_human: needs-human  # applied when crew escalates instead of acting
  cleanup: cleanup          # applied to spring-cleaning PRs

guardrails:
  # crew refuses to modify files matching these globs and escalates instead.
  protected_paths:
    # DB schema migrations. The dir name varies by tool — Rails/Django/Alembic use
    # migrations/, Liquibase uses changelog/ (or db/changelog/), Flyway db/migration/.
    # Replace this with the glob your repo actually uses (`/crew:init-config` detects it).
    - "**/migrations/**"
    - "**/*.tf"
    - "Dockerfile*"
    - ".env*"
    - ".github/**"
  # respond-to-review stops and asks for a human after this many rounds.
  max_review_iterations: 3

# Commands crew runs to validate its own changes. If omitted, crew auto-detects
# from package.json / pyproject.toml / go.mod / Cargo.toml.
commands:
  install: "npm ci"
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  test: "npm test"

review_standards:
  # Where review-pr reads your coding standards from. Defaults to AGENTS.md.
  source: "AGENTS.md"

team:
  # The advisory personas crew convenes — to advise during implement-issue / respond-to-review,
  # and (for substantial diffs) to adversarially review in review-pr.
  personas: [architect, pragmatist, perf-analyst, visionary, product-advocate]

knowledge:
  # Where manage-knowledge writes the decision log and topic index.
  dir: "docs/knowledge"

orchestrator:
  max_items: 5        # max issues/PRs /crew:run acts on per invocation
  concurrency: 2      # independent items processed in parallel, up to this
  auto_merge: false   # autonomy ceiling is a review-ready PR; humans merge
  # Scale-out floor. When triage/analysis flags a huge-scope task AND it breaks
  # into more independent units than this number, crew may fan the work out across
  # a Claude Workflow (one branch/PR per unit) instead of the serial loop — but it
  # ALWAYS asks you to confirm (with an agent-count/cost estimate) before spawning.
  # At or below this floor it stays serial. Set to 0 to disable scale-out entirely.
  scale_out: 8

# Local-mode settings (ignored in github mode).
ledger:
  # Where crew tracks local tasks (one folder per task). Gitignore this.
  dir: ".crew"
local:
  # How crew isolates the code it writes in local mode, in preference order:
  #   auto         — jj if installed (stacked changes), else kosho, else native
  #                  `git worktree` (default)
  #   jj           — jj workspace (.crew/workspaces/); colocates jj at the repo
  #                  root if needed, and stacks one bookmark per logical feature
  #                  set so crew can carry a large task across many changes
  #   kosho        — always use kosho worktrees (.kosho/)
  #   git-worktree — always use native `git worktree` (<ledger.dir>/worktrees/)
  #   none         — commit on a crew/<slug> branch in the main working tree
  isolation: auto
