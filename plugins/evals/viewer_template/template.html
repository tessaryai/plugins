<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Evals Synthesizer — Pipeline Viewer</title>
<style>
{{styles}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img class="logo" src="https://assets.tessary.ai/logo.png" width="28" height="28" alt="">
    <div>
      <h1>Evals Synthesizer</h1>
      <div class="sub" id="brand-sub">Pipeline viewer</div>
    </div>
  </div>
  <a class="cta" href="{{cta_url}}" target="_blank" rel="noopener">
    {{cta_label}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
         stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>

<div class="layout">
  <nav class="side" id="nav"></nav>

</div>

<script id="data" type="application/json">{{data_json}}</script>
<script id="config" type="application/json">{{config_json}}</script>
<script>
{{script}}
</script>
</body>
</html>
